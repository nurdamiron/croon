name: Prisma DB Push (prod)

on:
  workflow_dispatch:
    inputs:
      run_seed_kaspi:
        description: 'Запустить npm run seed:kaspi после db push'
        type: boolean
        required: false
        default: false

jobs:
  push:
    name: Push schema and optional seed
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Run prisma db push on EC2 via SSM
        id: ssm
        env:
          RUN_SEED: ${{ inputs.run_seed_kaspi }}
        run: |
          if [ "$RUN_SEED" = "true" ]; then
            CMD='cd /home/ubuntu/alashed-shop/frontend && npx prisma db push && npx prisma generate && npm run seed:kaspi && pm2 restart alash-electronics'
          else
            CMD='cd /home/ubuntu/alashed-shop/frontend && npx prisma db push && npx prisma generate && pm2 restart alash-electronics'
          fi
          echo "Will run: $CMD"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-06e2d5837c24c75f3 \
            --region eu-north-1 \
            --document-name "AWS-RunShellScript" \
            --comment "prisma db push" \
            --parameters commands="[\"sudo -u ubuntu bash -lc '$CMD'\"]" \
            --output text --query "Command.CommandId")
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for command to finish
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id i-06e2d5837c24c75f3 \
              --region eu-north-1 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "OK"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Failed with status: $STATUS"
              exit 1
            fi
          done

      - name: Show output
        if: always()
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-06e2d5837c24c75f3 \
            --region eu-north-1 \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text 2>/dev/null || echo "Could not fetch output"
