name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy alashed-shop to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build
        working-directory: frontend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://alash-electronics.kz
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_SITE_URL: https://alash-electronics.kz
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Build archive and upload to S3
        id: upload
        run: |
          ARCHIVE="deploy-$(date +%Y%m%d-%H%M%S).tar.gz"
          echo "archive=$ARCHIVE" >> $GITHUB_OUTPUT
          cd frontend
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar czf /tmp/$ARCHIVE \
            --exclude=.next/standalone/node_modules/.cache \
            .next/standalone \
            prisma \
            package.json
          aws s3 cp /tmp/$ARCHIVE s3://alashed-media/deploys/$ARCHIVE
          echo "Uploaded $ARCHIVE to S3"

      - name: Deploy to EC2 via SSM
        id: ssm
        run: |
          ARCHIVE="${{ steps.upload.outputs.archive }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-06e2d5837c24c75f3 \
            --region eu-north-1 \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy $ARCHIVE" \
            --parameters "commands=[\"set -e && echo '[deploy] cleanup old standalone' && rm -rf /home/ubuntu/alashed-shop/frontend/.next/standalone && echo '[deploy] fetch $ARCHIVE' && aws s3 cp s3://alashed-media/deploys/$ARCHIVE /home/ubuntu/deploy.tar.gz && echo '[deploy] extract' && tar xzf /home/ubuntu/deploy.tar.gz -C /home/ubuntu/alashed-shop/frontend/ && chown -R ubuntu:ubuntu /home/ubuntu/alashed-shop/frontend && rm -f /home/ubuntu/deploy.tar.gz && echo '[deploy] copy .env to standalone' && cp /home/ubuntu/alashed-shop/frontend/.env /home/ubuntu/alashed-shop/frontend/.next/standalone/.env 2>/dev/null || true && echo '[deploy] prisma generate' && sudo -H -u ubuntu bash -c 'cd /home/ubuntu/alashed-shop/frontend && npx prisma generate --schema=prisma/schema.prisma' && echo '[deploy] pm2 restart' && sudo -H -u ubuntu bash -c 'pm2 delete alash-electronics 2>/dev/null || true; PORT=5000 HOSTNAME=0.0.0.0 pm2 start /home/ubuntu/alashed-shop/frontend/.next/standalone/server.js --name alash-electronics; pm2 save' && echo '[deploy] done'\"]" \
            --output text --query "Command.CommandId")
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for deploy to finish
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          echo "Waiting for command $COMMAND_ID..."
          for i in $(seq 1 40); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id i-06e2d5837c24c75f3 \
              --region eu-north-1 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/40] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
          done

      - name: Show deploy output
        if: always()
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-06e2d5837c24c75f3 \
            --region eu-north-1 \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text 2>/dev/null || echo "Could not fetch output"
