# Одноразово: положить JSON ключ сервисного аккаунта Google Indexing на EC2.
# В GitHub → Settings → Secrets → Actions добавьте GOOGLE_INDEXING_JSON (весь JSON одним блоком).
# Затем Actions → "Upload Google Indexing key to EC2" → Run workflow.

name: Upload Google Indexing key to EC2

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Upload key to S3 (private object)
        env:
          KEY_JSON: ${{ secrets.GOOGLE_INDEXING_JSON }}
        run: |
          if [ -z "$KEY_JSON" ]; then
            echo "Добавьте секрет GOOGLE_INDEXING_JSON в репозитории."
            exit 1
          fi
          echo "$KEY_JSON" > /tmp/google-indexing-key.json
          aws s3 cp /tmp/google-indexing-key.json s3://alashed-media/deploys/google-indexing-service-account.json

      - name: Copy key on EC2 and chmod 600
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-06e2d5837c24c75f3 \
            --region eu-north-1 \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["set -eu && mkdir -p /home/ubuntu/.secrets && aws s3 cp s3://alashed-media/deploys/google-indexing-service-account.json /home/ubuntu/.secrets/google-indexing.json --region eu-north-1 && chown ubuntu:ubuntu /home/ubuntu/.secrets/google-indexing.json && chmod 600 /home/ubuntu/.secrets/google-indexing.json && echo OK"]' \
            --output text --query "Command.CommandId")
          echo "SSM: $COMMAND_ID"
          sleep 8
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-06e2d5837c24c75f3 \
            --region eu-north-1 \
            --query "Status" --output text)
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-06e2d5837c24c75f3 \
            --region eu-north-1 \
            --query "[Status,StandardOutputContent,StandardErrorContent]" \
            --output text
          test "$STATUS" = "Success"
